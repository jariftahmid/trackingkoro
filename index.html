<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tracker Dashboard Auto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:sans-serif;background:#000;color:white;}
#map{height:100vh;}
.panel{position:absolute;top:10px;left:10px;background:#111;padding:12px;border-radius:8px;z-index:999;}
input{padding:6px;width:70px;margin-top:5px;}
button{padding:6px 10px;margin-top:5px;}
</style>
</head>
<body>

<div class="panel">
Device ID: <input id="deviceId" value="phone1"><br>
Radius KM: <input id="radius" value="1"><br>
<button onclick="startTrack()">Start</button>
<button onclick="stopTrack()">Stop</button>
<button onclick="replay()">Replay</button>
<div id="info"></div>
</div>

<div id="map"></div>
<audio id="alarm"><source src="alert.mp3" type="audio/mpeg"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDfFKT5y5SZ8Wl_HaRezaDVpSEmyk4H7pY",
  authDomain: "aura-globe-735d3.firebaseapp.com",
  databaseURL: "https://aura-globe-735d3-default-rtdb.firebaseio.com",
  projectId: "aura-globe-735d3",
  storageBucket: "aura-globe-735d3.firebasestorage.app",
  messagingSenderId: "964001905585",
  appId: "1:964001905585:web:1c52a216d056cbbdf29b90",
  measurementId: "G-B5H5N60J61"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Leaflet map
let map = L.map('map').setView([23.8103,90.4125],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let markers={}, paths={}, historyData={};
let geofence=L.circle([23.8103,90.4125],{radius:1000,color:"green"}).addTo(map);
let targetLat=23.8103,targetLng=90.4125;

// Distance helper
function distance(lat1,lon1,lat2,lon2){
  const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c;
}

// Replay movement
function replay(){
  for(let id in historyData){
    let route=historyData[id], marker=markers[id], i=0;
    let interval=setInterval(()=>{
      if(i>=route.length){clearInterval(interval);return;}
      marker.setLatLng(route[i]);
      i++;
    },200);
  }
}

// Dashboard control
function startTrack(){
  const deviceId=document.getElementById("deviceId").value;
  set(ref(db,"control/"+deviceId),{tracking:true});
}
function stopTrack(){
  const deviceId=document.getElementById("deviceId").value;
  set(ref(db,"control/"+deviceId),{tracking:false});
}

// Move geofence on map click
map.on("click",e=>{
  targetLat=e.latlng.lat; targetLng=e.latlng.lng;
  geofence.setLatLng(e.latlng);
});

// Listen all devices
onValue(ref(db,"tracker"),snap=>{
  const devices=snap.val(); if(!devices) return;
  for(let id in devices){
    const d=devices[id]; const pos=[d.lat,d.lng];
    if(!markers[id]){
      markers[id]=L.marker(pos).addTo(map);
      paths[id]=L.polyline([], {color:"red"}).addTo(map);
      historyData[id]=[];
    }else markers[id].setLatLng(pos);
    historyData[id].push(pos);
    paths[id].setLatLngs(historyData[id]);

    // Geofence check
    const radius=parseFloat(document.getElementById("radius").value);
    geofence.setRadius(radius*1000);
    if(distance(targetLat,targetLng,d.lat,d.lng)<radius){
      document.getElementById("alarm").play();
      document.getElementById("info").innerText=id+" entered geofence!";
    }
  }
});

</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
