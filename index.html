<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Tracker Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:white;}
#map{height:100vh;}

.panel{
  position:absolute;top:10px;left:10px;
  background:#111;padding:12px;border-radius:10px;
  z-index:999;width:200px;
}

select,input,button{
  width:100%;padding:6px;margin-top:5px;
  border:none;border-radius:5px;
}

#details{margin-top:8px;font-size:13px;}
</style>
</head>
<body>

<div class="panel">

<select id="deviceSelect"></select>

<select id="radius">
  <option value="0.1">100 Meter</option>
  <option value="0.5">500 Meter</option>
  <option value="1">1 KM</option>
  <option value="2">2 KM</option>
</select>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>
<button id="replayBtn">Replay</button>

<div id="details"></div>
<div id="info"></div>

</div>

<div id="map"></div>

<audio id="alarm">
<source src="https://www.soundjay.com/free-music_c2026/sounds/midnight-ride-01a.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = { /* SAME CONFIG */ };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// MAP
let map = L.map('map').setView([23.8103,90.4125],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

// DATA
let markers={}, historyData={}, selectedDevice=null;
let myLat=null, myLng=null;

// DISTANCE
function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 📍 YOUR LOCATION (CENTER)
navigator.geolocation.watchPosition(pos=>{
  myLat=pos.coords.latitude;
  myLng=pos.coords.longitude;

  if(!window.meMarker){
    window.meMarker=L.marker([myLat,myLng]).addTo(map).bindPopup("You");
  } else {
    window.meMarker.setLatLng([myLat,myLng]);
  }

}, err=>console.warn(err), {enableHighAccuracy:true});

// 📥 LOAD DEVICES
onValue(ref(db,"tracker"), snap=>{
  const devices=snap.val();
  if(!devices) return;

  const select=document.getElementById("deviceSelect");
  select.innerHTML="";

  Object.keys(devices).forEach(id=>{
    const opt=document.createElement("option");
    opt.value=id;
    opt.textContent=id;
    select.appendChild(opt);
  });

  if(!selectedDevice) selectedDevice=select.value;
});

// 🎯 SELECT CHANGE
document.getElementById("deviceSelect").addEventListener("change", e=>{
  selectedDevice=e.target.value;
});

// ▶️ START / STOP
document.getElementById("startBtn").onclick=()=>{
  set(ref(db,"control/"+selectedDevice),{tracking:true});
};
document.getElementById("stopBtn").onclick=()=>{
  set(ref(db,"control/"+selectedDevice),{tracking:false});
};

// 🔁 REPLAY
function replay(){
  if(!selectedDevice || !historyData[selectedDevice]) return;
  let route=historyData[selectedDevice];
  let i=0;
  let interval=setInterval(()=>{
    if(i>=route.length){clearInterval(interval);return;}
    markers[selectedDevice].setLatLng(route[i]);
    i++;
  },200);
}
document.getElementById("replayBtn").onclick=replay;

// 📡 MAIN LISTENER
onValue(ref(db,"tracker"), snap=>{
  const devices=snap.val();
  if(!devices || !selectedDevice) return;

  const d=devices[selectedDevice];
  if(!d) return;

  const pos=[d.lat,d.lng];

  // marker
  if(!markers[selectedDevice]){
    markers[selectedDevice]=L.marker(pos).addTo(map);
    historyData[selectedDevice]=[];
  } else {
    markers[selectedDevice].setLatLng(pos);
  }

  historyData[selectedDevice].push(pos);

  // 📊 DETAILS
  document.getElementById("details").innerHTML=`
  🆔 ${selectedDevice}<br>
  🟢 ${d.online ? "Online":"Offline"}<br>
  🔋 Battery: ${d.battery || "N/A"}%<br>
  📶 Network: ${d.network || "Unknown"}<br>
  `;

  // 🚨 RADIUS ALERT (YOUR PHONE BASED)
  if(myLat!==null){
    const radius=parseFloat(document.getElementById("radius").value);
    const dist=distance(myLat,myLng,d.lat,d.lng);

    if(dist < radius){
      document.getElementById("alarm").play();
      document.getElementById("info").innerText=
        "🚨 Near you: "+dist.toFixed(2)+" KM";
    }
  }
});
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
